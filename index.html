<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>Travel Plan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.292.0"
      }
    }
    </script>
    <style>
        * { -ms-overflow-style: none; scrollbar-width: none; }
        *::-webkit-scrollbar { display: none; }
        @keyframes slideInLeft { from { transform: translateX(-100%); } to { transform: translateX(0); } }
        .animate-slide-in-left { animation: slideInLeft 0.3s ease-out forwards; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background-color: #f9f9f9; 
            color: #4b5563; 
            margin: 0; 
            padding: 0; 
            overflow-x: hidden; 
        }
        input[type=number]::-webkit-inner-spin-button, input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; }
        input[type="time"]::-webkit-datetime-edit-ampm-field { display: none; }
        input:read-only, select:disabled, textarea:readOnly { pointer-events: none; opacity: 0.8; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useRef, useMemo } from 'react';
        import { createRoot } from 'react-dom/client';
        import { initializeApp, getApps, deleteApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
        import { getAuth, signInAnonymously, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js';
        import { getFirestore, doc, setDoc, getDoc, onSnapshot, updateDoc, enableIndexedDbPersistence } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';
        import { MapPin, Clock, Train, Bus, Car, Footprints, Plane, TramFront, Plus, Trash2, Map, ArrowRight, Image, Loader, X, DollarSign, Navigation, PieChart, Menu, History, Check, Wifi, WifiOff, ArrowRightCircle, Info, Download, ExternalLink, BedDouble, LogIn, LogOut as LogOutIcon, Phone, Edit3, Save, UserX, Camera, ChevronDown, Users, Settings, Shield } from 'lucide-react';

        const appId = typeof __app_id !== 'undefined' ? __app_id : 'my-travel-planner';

        // --- Constants ---
        const currencies = [
            { value: 'JPY', label: '日圓 (JPY)' },
            { value: 'TWD', label: '新台幣 (TWD)' }
        ];

        const transportOptions = [
            { value: 'walk', label: '步行', icon: Footprints }, { value: 'car', label: '自駕', icon: Car },
            { value: 'taxi', label: '計程車', icon: Car }, { value: 'bus', label: '公車', icon: Bus },
            { value: 'train', label: '電車', icon: Train }, { value: 'shinkansen', label: '新幹線', icon: Train },
            { value: 'nightbus', label: '夜間巴士', icon: Bus }, { value: 'tram', label: '路面電車', icon: TramFront },
            { value: 'plane', label: '飛機', icon: Plane },
        ];

        const durationOptions = Array.from({ length: 20 }, (_, i) => {
            const m = (i + 1) * 15, h = Math.floor(m / 60), min = m % 60;
            return { value: String(m), label: h === 0 ? `${min} 分鐘` : min === 0 ? `${h} 小時` : `${h} 小時 ${min} 分` };
        });

        const CATEGORY_COLORS = { '餐飲': '#FF6384', '交通': '#36A2EB', '住宿': '#FFCE56', '購物': '#4BC0C0', '娛樂': '#9966FF', '門票': '#FF9F40', '藥妝': '#FF6B6B', '其他': '#C9CBCF' };
        const TIME_OPTIONS = [];
        for(let i=0; i<24; i++) {
            const h = String(i).padStart(2, '0');
            TIME_OPTIONS.push(`${h}:00`);
            TIME_OPTIONS.push(`${h}:30`);
        }

        // --- Helper Functions ---
        const generateId = () => Math.random().toString(36).substr(2, 9);
        const getOrCreateUserId = () => {
            let uid = localStorage.getItem('gtp_local_uid');
            if (!uid) { uid = generateId(); localStorage.setItem('gtp_local_uid', uid); }
            return uid;
        };
        const resizeImage = (file) => new Promise((resolve) => {
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = document.createElement('img');
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    let w = img.width, h = img.height, max = 1024;
                    if (w > h) { if (w > max) { h *= max/w; w = max; } } else { if (h > max) { w *= max/h; h = max; } }
                    canvas.width = w; canvas.height = h;
                    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                    resolve(canvas.toDataURL('image/jpeg', 0.8));
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        });
        const sanitizeFirestoreData = (data) => JSON.parse(JSON.stringify(data, (k, v) => v === undefined ? null : v));
        const getDatesArray = (s, e) => { const a = [], d = new Date(s), ed = new Date(e); while(d<=ed) { a.push(new Date(d).toISOString().split('T')[0]); d.setDate(d.getDate()+1); } return a; };
        const getDayOfWeek = (d) => ['週日','週一','週二','週三','週四','週五','週六'][new Date(d).getDay()];
        const getMonthDay = (d) => { const date = new Date(d); return `${date.getMonth()+1}/${date.getDate()}`; };
        const toLocalISOString = (date) => { const d = new Date(date); const year = d.getFullYear(); const month = String(d.getMonth() + 1).padStart(2, '0'); const day = String(d.getDate()).padStart(2, '0'); return `${year}-${month}-${day}`; };
        const openGoogleMaps = (query) => { window.open(`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(query)}`, '_blank'); };
        
        // [NEW] Helper to shift date by N days
        const getDiffDays = (s, e) => (new Date(e) - new Date(s)) / (1000 * 60 * 60 * 24);
        const shiftDate = (d, diff) => {
            if (!d) return d;
            const date = new Date(d);
            date.setDate(date.getDate() + diff);
            return date.toISOString().split('T')[0];
        };

        // --- Error Boundary ---
        class ErrorBoundary extends React.Component {
            constructor(props) { super(props); this.state = { hasError: false, error: null }; }
            static getDerivedStateFromError(error) { return { hasError: true, error }; }
            componentDidCatch(error, errorInfo) { console.error("Uncaught error:", error, errorInfo); }
            render() {
                if (this.state.hasError) {
                    return (
                        <div className="flex h-screen flex-col items-center justify-center bg-red-50 p-6 text-center">
                            <h1 className="text-xl font-bold text-gray-800 mb-2">發生錯誤</h1>
                            <p className="text-sm text-gray-600 mb-6 bg-white p-2 rounded border border-gray-200">{this.state.error?.message}</p>
                            <button onClick={() => window.location.reload()} className="py-2 px-4 bg-[#0ABAB5] text-white rounded-xl">重載頁面</button>
                        </div>
                    );
                }
                return this.props.children;
            }
        }

        // Info Popup
        const InfoPopup = ({ isOpen, onClose, title, content }) => !isOpen ? null : (
            <div className="fixed inset-0 z-[100] flex items-center justify-center px-4">
                <div className="absolute inset-0 bg-black/20 backdrop-blur-sm" onClick={onClose}></div>
                <div className="bg-white w-full max-w-sm rounded-2xl p-6 relative z-10 shadow-xl">
                    <h3 className="text-lg font-bold text-[#0ABAB5] mb-3 flex items-center gap-2"><Info size={20} /> {title}</h3>
                    <div className="text-sm text-gray-600 leading-relaxed whitespace-pre-line">{content}</div>
                    <button onClick={onClose} className="mt-6 w-full py-2.5 rounded-xl bg-gray-100 text-gray-600 font-bold hover:bg-gray-200">了解</button>
                </div>
            </div>
        );

        // Image Upload Helper
        const processImageUpload = async (file) => {
            const b64 = await resizeImage(file);
            if (!b64) return null;
            const imgbbKey = localStorage.getItem('gtp_imgbb_key');
            if (imgbbKey) {
                try {
                    const formData = new FormData();
                    formData.append('image', b64.split(',')[1]);
                    const res = await fetch(`https://api.imgbb.com/1/upload?key=${imgbbKey}`, { method: 'POST', body: formData });
                    const data = await res.json();
                    if (data.success) return data.data.url;
                    else alert("圖片上傳失敗，將使用本機儲存。錯誤: " + (data.error?.message || 'Unknown'));
                } catch (err) { alert("連線 Imgbb 失敗，將使用本機儲存。"); }
            }
            return b64;
        };

        const ConfirmModal = ({ isOpen, message, onConfirm, onCancel }) => {
            if (!isOpen) return null;
            return (
                <div className="fixed inset-0 z-[100] flex items-center justify-center px-4">
                    <div className="absolute inset-0 bg-black/20 backdrop-blur-sm" onClick={onCancel}></div>
                    <div className="bg-[#F5FDFC] w-full max-w-xs rounded-2xl p-6 border border-[#eeeeee] relative z-10 flex flex-col items-center text-center">
                        <div className="w-12 h-12 bg-red-100 rounded-full flex items-center justify-center mb-4 text-red-500"><Trash2 size={24} /></div>
                        <h3 className="text-lg font-bold text-gray-800 mb-2">確認</h3>
                        <p className="text-gray-600 mb-6 text-sm whitespace-pre-line">{message}</p>
                        <div className="flex gap-3 w-full">
                            <button onClick={onCancel} className="flex-1 py-2.5 rounded-xl text-gray-500 font-bold bg-gray-200">取消</button>
                            <button onClick={onConfirm} className="flex-1 py-2.5 rounded-xl bg-red-500 text-white font-bold">確定</button>
                        </div>
                    </div>
                </div>
            );
        };

        // Landing View
        const LandingView = ({ onConnect, onOffline, joinId, setJoinId, onJoin, recentTrips, onDeleteTrip, isOffline, onCreateTrip }) => {
            const [configInput, setConfigInput] = useState('');
            const [imgbbKey, setImgbbKey] = useState(''); 
            const [testStatus, setTestStatus] = useState('idle');
            const [errorMessage, setErrorMessage] = useState('');
            const [successMessage, setSuccessMessage] = useState(''); 
            const [infoType, setInfoType] = useState(null); 
            const [pendingJoinId, setPendingJoinId] = useState(null); 
            const [confirmData, setConfirmData] = useState({ open: false, message: '', onConfirm: null });

            useEffect(() => {
                const storedConfig = localStorage.getItem('gtp_firebase_config');
                const storedImgbb = localStorage.getItem('gtp_imgbb_key');
                if (storedConfig) {
                    try { setConfigInput(JSON.stringify(JSON.parse(storedConfig), null, 2).replace(/[{}]/g, '').trim()); } catch(e) { setConfigInput(storedConfig); }
                }
                if (storedImgbb) setImgbbKey(storedImgbb);
                if (!isOffline) {
                    setTestStatus('success');
                    setSuccessMessage('目前已連線');
                    if (pendingJoinId) { onJoin(pendingJoinId); setPendingJoinId(null); }
                }
            }, [isOffline, pendingJoinId, onJoin]);

            const parseConfig = (str) => {
                try { return JSON.parse(str); } catch (e) {
                    const obj = {};
                    ['apiKey', 'authDomain', 'projectId', 'storageBucket', 'messagingSenderId', 'appId'].forEach(key => {
                        const match = str.match(new RegExp(`${key}\\s*:\\s*["']([^"']+)["']`, 'i'));
                        if (match && match[1]) obj[key] = match[1];
                    });
                    return Object.keys(obj).length > 0 ? obj : null;
                }
            };

            const handleTestConnection = async () => {
                setTestStatus('testing'); setErrorMessage(''); setSuccessMessage('');
                const config = parseConfig(configInput);
                if (!config || !config.apiKey) { setTestStatus('error'); setErrorMessage('無法辨識 Firebase 設定檔格式'); return; }
                try {
                    const tempApp = initializeApp(config, 'test-' + Date.now());
                    await signInAnonymously(getAuth(tempApp));
                    await deleteApp(tempApp);
                    localStorage.setItem('gtp_firebase_config', JSON.stringify(config));
                    localStorage.setItem('gtp_imgbb_key', imgbbKey.trim());
                    onConnect(config);
                } catch (e) { setTestStatus('error'); setErrorMessage(`連線失敗: ${e.message}`); }
            };

            const handleJoinClick = () => {
                const cleanId = (joinId || '').trim();
                if (!cleanId) { alert("請輸入旅程 ID"); return; }
                if (cleanId.startsWith('{')) {
                    try {
                        const bundle = JSON.parse(cleanId);
                        if (bundle.id && bundle.firebase) {
                            setConfirmData({
                                open: true,
                                message: `偵測到設定檔代碼 (ID: ${bundle.id})。\n\n是否匯入設定並加入？`,
                                onConfirm: () => {
                                    localStorage.setItem('gtp_firebase_config', JSON.stringify(bundle.firebase));
                                    if (bundle.imgbb) localStorage.setItem('gtp_imgbb_key', bundle.imgbb);
                                    setConfigInput(JSON.stringify(bundle.firebase, null, 2).replace(/[{}]/g, '').trim());
                                    setPendingJoinId(bundle.id); setJoinId(bundle.id); onConnect(bundle.firebase);
                                }
                            });
                            return;
                        }
                    } catch (e) {}
                }
                if (isOffline && configInput.trim().length > 10 && !localStorage.getItem('gtp_firebase_config')) {
                    alert("請先點擊「測試連線」儲存設定！"); return;
                }
                onJoin(cleanId);
            };

            return (
                <div className="flex flex-col h-full bg-[#F5FDFC] overflow-y-auto no-scrollbar">
                    <div className="flex-1 flex flex-col p-8 max-w-md mx-auto w-full">
                        <div className="text-center mb-6">
                            <h1 className="text-3xl font-bold text-[#0ABAB5] mb-2">Travel Plan</h1>
                            <p className="text-gray-500 text-sm">設定雲端連線或讀取本機行程</p>
                        </div>
                        <div className="bg-gray-100 p-6 rounded-2xl shadow-sm border border-gray-100 mb-6">
                            <div className="flex justify-between items-center mb-2"><label className="text-xs font-bold text-gray-400">Firebase Config</label><button onClick={() => setInfoType('firebase')}><Info size={16} className="text-gray-400"/></button></div>
                            <textarea value={configInput} onChange={(e) => { setConfigInput(e.target.value); setTestStatus('idle'); }} className="w-full h-12 p-3 bg-[#E2E2E2] rounded-xl text-xs font-mono resize-none mb-4" placeholder={`apiKey: "..."`} />
                            <div className="flex justify-between items-center mb-2"><label className="text-xs font-bold text-gray-400">Imgbb API Key (選填)</label><button onClick={() => setInfoType('imgbb')}><Info size={16} className="text-gray-400"/></button></div>
                            <input value={imgbbKey} onChange={(e) => { setImgbbKey(e.target.value); setTestStatus('idle'); }} className="w-full p-3 bg-[#E2E2E2] rounded-xl text-xs font-mono mb-4" />
                            <div className="flex gap-3">
                                <button onClick={handleTestConnection} disabled={testStatus === 'testing'} className={`flex-1 py-2 rounded-lg font-bold text-xs ${testStatus === 'testing' ? 'bg-gray-200' : 'bg-[#E0F2F1] text-[#00695C]'}`}>{testStatus === 'testing' ? <Loader className="animate-spin" size={14}/> : '測試連線'}</button>
                                {testStatus === 'success' && <span className="text-green-500 flex items-center text-xs gap-1"><Check size={14}/> {successMessage}</span>}
                                {testStatus === 'error' && <span className="text-red-500 flex items-center text-xs gap-1"><X size={14}/> 失敗</span>}
                            </div>
                            {errorMessage && <p className="text-red-500 text-[10px] mt-2">{errorMessage}</p>}
                        </div>
                        <div className="flex gap-2 w-full mb-8">
                            <button onClick={() => { if (!localStorage.getItem('gtp_imgbb_key')) { setConfirmData({ open: true, message: "未設定 Imgbb Key，照片將受限。\n確定繼續？", onConfirm: onCreateTrip }); } else { onCreateTrip(); } }} disabled={testStatus !== 'success'} className={`flex-1 py-3 rounded-xl font-bold text-white shadow-lg flex items-center justify-center gap-2 ${testStatus === 'success' ? 'bg-[#0ABAB5]' : 'bg-gray-300'}`}><Plus size={18} /> 建立雲端新旅程</button>
                            <button onClick={() => { localStorage.removeItem('gtp_firebase_config'); onOffline(); }} className="w-[35%] py-3 rounded-xl font-bold text-white bg-red-400 flex items-center justify-center gap-2 shadow-lg"><WifiOff size={18} /> 單機版</button>
                        </div>
                        <div className="border-t border-gray-200 pt-6">
                            <div className="flex gap-2 mb-4"><input placeholder="輸入旅程 ID" value={joinId} onChange={e => setJoinId(e.target.value)} onKeyDown={(e) => e.key === 'Enter' && handleJoinClick()} className="flex-1 p-2 bg-[#E2E2E2] rounded-lg font-bold outline-none text-sm" /><button onClick={handleJoinClick} className="bg-[#0ABAB5] text-white p-2 rounded-lg"><ArrowRight size={20} /></button></div>
                            {recentTrips.length > 0 && (
                                <div className="mt-8"><h3 className="text-xs font-bold text-gray-400 mb-3 flex items-center gap-2 uppercase"><History size={14}/> 近期瀏覽</h3>
                                    <div className="space-y-2">{recentTrips.map(trip => (
                                        <div key={trip.id} onClick={() => onJoin(trip.id)} className="bg-[#EDF7F6] p-3 rounded-xl border border-gray-200 flex justify-between items-center cursor-pointer hover:border-[#0ABAB5]">
                                            <div><div className="font-bold text-gray-700 text-sm">{trip.destination || '未命名'}</div><div className="text-[10px] text-gray-400">{trip.dateRange}</div></div>
                                            <button onClick={(e) => onDeleteTrip(trip.id, e)} className="p-2 text-gray-400 hover:text-red-500"><Trash2 size={16} /></button>
                                        </div>
                                    ))}</div>
                                </div>
                            )}
                        </div>
                    </div>
                    <InfoPopup isOpen={infoType === 'firebase'} onClose={() => setInfoType(null)} title="Firebase 設定" content={`1. 前往 Firebase Console > Project Settings\n2. 複製 const firebaseConfig = {...} 內容貼上`} />
                    <InfoPopup isOpen={infoType === 'imgbb'} onClose={() => setInfoType(null)} title="Imgbb API Key" content={`1. 前往 api.imgbb.com 取得 API Key\n2. 貼上以啟用無限圖床功能`} />
                    <ConfirmModal isOpen={confirmData.open} message={confirmData.message} onConfirm={() => { if (confirmData.onConfirm) confirmData.onConfirm(); setConfirmData({ ...confirmData, open: false }); }} onCancel={() => setConfirmData({ ...confirmData, open: false })} />
                </div>
            );
        };

        const MemberManagementModal = ({ isOpen, onClose, tripData, currentMember, onUpdateMember, onRemoveMember, onAddMember }) => {
            const [editingIndex, setEditingIndex] = useState(null);
            const [editForm, setEditForm] = useState({ name: '', pin: '' });
            const [confirmRemove, setConfirmRemove] = useState(null);
            const [isAdding, setIsAdding] = useState(false);
            const [newMemberName, setNewMemberName] = useState('');
            if (!isOpen || !tripData) return null;
            const isOwner = currentMember?.role === 'owner';
            
            // [MODIFIED] Helper to get member identifier (deviceId or name)
            const getMemberId = (m) => m.deviceId || m.name;

            const handleSaveClick = (index) => {
                const member = tripData.members[index];
                if (!editForm.name.trim() || !editForm.pin.trim()) return alert("不得為空");
                // [MODIFIED] Pass identifier instead of index
                onUpdateMember(getMemberId(member), editForm);
                setEditingIndex(null);
            };

            return (
                <div className="fixed inset-0 z-[90] flex items-center justify-center px-4">
                    <div className="absolute inset-0 bg-black/20 backdrop-blur-sm" onClick={onClose}></div>
                    <div className="bg-[#F5FDFC] w-full max-w-md rounded-2xl p-6 border border-[#eeeeee] relative z-10 flex flex-col max-h-[85vh]">
                        <div className="flex justify-between items-center mb-4 border-b pb-2"><h3 className="text-lg font-bold text-[#0ABAB5] flex items-center gap-2"><Users size={20}/> 旅伴管理</h3><button onClick={onClose}><X size={20} className="text-gray-400"/></button></div>
                        <div className="space-y-3 overflow-y-auto p-1 mb-4 custom-scrollbar">
                            {tripData.members.map((member, index) => {
                                if (!member) return null;
                                const isSelf = (member.deviceId && currentMember?.deviceId && member.deviceId === currentMember.deviceId) || member.name === currentMember?.name;
                                const canEdit = isOwner || isSelf; 
                                return (
                                    <div key={getMemberId(member)} className={`p-3 rounded-xl border ${isSelf ? 'border-[#0ABAB5] bg-[#E0F2F1]' : 'border-[#eeeeee] bg-[#EDF7F6]'} flex items-center justify-between`}>
                                        {editingIndex === index ? (
                                            <div className="flex-1 flex gap-2 items-center"><input value={editForm.name} onChange={e => setEditForm({...editForm, name: e.target.value})} className="w-1/2 p-2 text-sm bg-[#E2E2E2] rounded-lg" /><input value={editForm.pin} onChange={e => setEditForm({...editForm, pin: e.target.value})} className="w-1/3 p-2 text-sm bg-[#E2E2E2] rounded-lg" /><button onClick={() => handleSaveClick(index)} className="text-green-500 p-1"><Save size={18}/></button><button onClick={() => setEditingIndex(null)} className="text-gray-400 p-1"><X size={18}/></button></div>
                                        ) : (
                                            <><div className="flex items-center gap-3"><div className={`w-8 h-8 rounded-full flex items-center justify-center text-white font-bold text-xs ${member.role === 'owner' ? 'bg-yellow-400' : 'bg-gray-400'}`}>{member.name.charAt(0)}</div><div><div className="font-bold text-gray-700 text-sm flex items-center gap-1">{member.name}{member.role === 'owner' && <Shield size={12} className="text-yellow-500"/>}{isSelf && <span className="text-[10px] text-[#0ABAB5] bg-[#0ABAB5]/10 px-1 rounded">我</span>}</div><div className="text-[10px] text-gray-400">PIN: {member.pin}</div></div></div><div className="flex gap-1">{canEdit && <button onClick={() => { setEditingIndex(index); setEditForm({ name: member.name, pin: member.pin }); }} className="p-2 text-gray-400 hover:text-[#0ABAB5]"><Edit3 size={16}/></button>}{isOwner && member.role !== 'owner' && <button onClick={() => setConfirmRemove(getMemberId(member))} className="p-2 text-gray-400 hover:text-red-500"><UserX size={16}/></button>}</div></>
                                        )}
                                    </div>
                                );
                            })}
                        </div>
                        {isOwner && (
                            <div className="mt-auto pt-2 border-t border-[#eeeeee]">
                                {isAdding ? (
                                    <div className="flex gap-2 items-center"><input value={newMemberName} onChange={(e) => setNewMemberName(e.target.value)} placeholder="新旅伴名稱" className="flex-1 p-3 bg-[#E2E2E2] rounded-xl text-sm" /><button onClick={() => { if(newMemberName) onAddMember({ name: newMemberName, pin: '0000', role: 'collaborator', deviceId: 'offline_' + Date.now() }); setIsAdding(false); setNewMemberName(''); }} className="bg-[#0ABAB5] text-white p-3 rounded-xl"><Check size={18}/></button><button onClick={() => setIsAdding(false)} className="bg-gray-200 text-gray-500 p-3 rounded-xl"><X size={18}/></button></div>
                                ) : <button onClick={() => setIsAdding(true)} className="w-full py-3 bg-[#E0F2F1] text-[#00695C] rounded-xl font-bold flex items-center justify-center gap-2"><Plus size={18}/> 新增旅伴</button>}
                            </div>
                        )}
                    </div>
                    <ConfirmModal isOpen={confirmRemove !== null} message="確定移除此旅伴？" onConfirm={() => { onRemoveMember(confirmRemove); setConfirmRemove(null); }} onCancel={() => setConfirmRemove(null)} />
                </div>
            );
        };

        const JoinModal = ({ isOpen, onClose, tripData, onJoin }) => {
            const [mode, setMode] = useState('new'); const [name, setName] = useState(''); const [pin, setPin] = useState(''); const [error, setError] = useState('');
            if (!isOpen || !tripData) return null;
            const handleJoin = () => {
                if (!pin.trim()) return setError('請輸入 PIN');
                if (mode === 'new') {
                    if (!name.trim()) return setError('請輸入暱稱');
                    if (tripData.members.some(m => m.name === name.trim())) return setError('暱稱已存在');
                    onJoin({ name: name.trim(), pin: pin.trim(), role: 'collaborator', isNew: true });
                } else {
                    const m = tripData.members.find(m => m.name === name);
                    if (!m) return setError('找不到成員');
                    if (m.pin !== pin.trim()) return setError('PIN 錯誤');
                    onJoin({ name: m.name, pin: m.pin, role: m.role, isNew: false });
                }
            };
            return (
                <div className="fixed inset-0 z-[80] flex items-center justify-center px-4">
                    <div className="absolute inset-0 bg-black/20 backdrop-blur-sm" onClick={onClose}></div>
                    <div className="bg-[#F5FDFC] w-full max-w-sm rounded-2xl p-6 border border-[#eeeeee] relative z-10 flex flex-col">
                        <h3 className="text-xl font-bold text-[#0ABAB5] mb-4 text-center">加入旅程</h3>
                        <div className="flex bg-gray-200 p-1 rounded-xl mb-4"><button onClick={() => setMode('new')} className={`flex-1 py-2 rounded-lg text-sm font-bold ${mode === 'new' ? 'bg-white text-[#0ABAB5]' : 'text-gray-500'}`}>新協作者</button><button onClick={() => setMode('old')} className={`flex-1 py-2 rounded-lg text-sm font-bold ${mode === 'old' ? 'bg-white text-[#0ABAB5]' : 'text-gray-500'}`}>舊成員</button></div>
                        <div className="space-y-4">
                            {mode === 'new' ? <div><label className="text-xs font-bold text-gray-500">暱稱</label><input value={name} onChange={e => setName(e.target.value)} className="w-full p-3 bg-[#E2E2E2] rounded-xl" /></div> : <div><label className="text-xs font-bold text-gray-500">身分</label><select value={name} onChange={e => setName(e.target.value)} className="w-full p-3 bg-[#E2E2E2] rounded-xl">{tripData.members.map(m => <option key={m.name} value={m.name}>{m.name}</option>)}</select></div>}
                            <div><label className="text-xs font-bold text-gray-500">PIN 碼</label><input type="password" value={pin} onChange={e => setPin(e.target.value)} className="w-full p-3 bg-[#E2E2E2] rounded-xl" /></div>
                        </div>
                        {error && <p className="text-red-500 text-xs mt-2 text-center">{error}</p>}
                        <button onClick={handleJoin} className="w-full py-3 bg-[#0ABAB5] text-white rounded-xl font-bold mt-6">加入</button>
                    </div>
                </div>
            );
        };

        const AutoSaveInput = ({ value, onSave, readOnly, detectLinks, ...props }) => {
            const [v, setV] = useState(value ?? ''); const [isEditing, setIsEditing] = useState(false);
            useEffect(() => setV(value ?? ''), [value]);
            const handleBlur = () => { if (String(v) !== String(value ?? '')) onSave(v); if (detectLinks) setIsEditing(false); };
            if (detectLinks && !isEditing) {
                const renderWithLinks = (str) => {
                    if (!str) return null;
                    return str.split(/(https?:\/\/[^\s]+)/g).map((part, i) => part.match(/https?:\/\//) ? <a key={i} href={part} target="_blank" className="text-blue-500 underline" onClick={e => e.stopPropagation()}>{part}</a> : part);
                };
                return <div onClick={(e) => { if (!readOnly) { e.stopPropagation(); setIsEditing(true); } }} className={`${props.className} cursor-text min-h-[1.5rem] whitespace-pre-wrap break-words`} style={{ cursor: readOnly ? 'default' : 'text' }}>{v ? renderWithLinks(String(v)) : <span className="text-gray-400 opacity-60 italic">{props.placeholder}</span>}</div>;
            }
            return props.type === 'textarea' ? <textarea {...props} value={v} onChange={e => setV(e.target.value)} onBlur={handleBlur} readOnly={readOnly} autoFocus={detectLinks && isEditing} /> : <input {...props} value={v} onChange={e => setV(e.target.value)} onBlur={handleBlur} onKeyDown={e => { if (e.key === 'Enter') e.target.blur(); }} readOnly={readOnly} autoFocus={detectLinks && isEditing} />;
        };

        const AccommodationCard = ({ date, data, onUpdate, onPhotoUpload, onPhotoDelete, onViewImage, onAdd, onDelete, isOwner, currentMember, members }) => {
            const [expandedId, setExpandedId] = useState(null);
            return (
                <div className="bg-[#FFF9C4] border border-yellow-300 shadow-sm rounded-2xl p-1.5 mt-4 relative mb-2">
                    {(!data || data.length === 0) && <div className="text-center text-yellow-600 text-xs py-1">尚未新增住宿</div>}
                    {(data || []).map((item, index) => {
                        if (!item) return null;
                        const isExpanded = expandedId === item.id;
                        return (
                            // [FIX] Strictly use item.id as key to prevent input state issues during re-renders
                            <div key={item.id} className={index > 0 ? "border-t border-yellow-200 pt-0.5 mt-0.5" : ""}>
                                <div className="flex items-center justify-between cursor-pointer" onClick={() => setExpandedId(isExpanded ? null : item.id)}>
                                    <div className="flex items-center gap-1 flex-1 min-w-0 pr-8"><BedDouble size={14} className="text-gray-600 flex-shrink-0" /><div onClick={(e) => e.stopPropagation()} className="flex-1 flex items-center"><AutoSaveInput type="text" readOnly={!isOwner} placeholder="飯店名稱..." value={item.name} onSave={(val) => onUpdate(item.id, 'name', val)} className="bg-transparent text-xs font-bold text-gray-800 outline-none w-full" /></div></div>
                                    <div className="flex items-center gap-1">{isOwner && <button onClick={(e) => { e.stopPropagation(); onDelete(item.id); }} className="text-red-400 p-0.5"><Trash2 size={12} /></button>}<ChevronDown size={14} className={`text-yellow-600 transition ${isExpanded ? 'rotate-180' : ''}`} /></div>
                                </div>
                                <div className={`transition-all duration-300 overflow-hidden ${isExpanded ? 'max-h-[1000px] opacity-100' : 'max-h-0 opacity-0'}`}>
                                    <div className="pt-1 pb-0.5 space-y-1">
                                        <div className="flex gap-1 mb-1 items-center px-1">
                                            <div className="flex-1 min-w-0"><AutoSaveInput type="text" readOnly={!isOwner} placeholder="訂房編號" value={item.bookingCode} onSave={(val) => onUpdate(item.id, 'bookingCode', val)} className="text-xs text-gray-500 bg-transparent outline-none w-full" /></div>
                                            <div className="flex flex-col gap-1 flex-shrink-0">
                                                <div className="flex items-center gap-1 bg-[#E2E2E2] border border-gray-300 px-1.5 py-0.5 rounded-lg"><LogIn size={10} className="text-green-600" /><input type="date" value={item.checkInDate || ''} onChange={(e) => onUpdate(item.id, 'checkInDate', e.target.value)} onClick={(e) => e.stopPropagation()} disabled={!isOwner} className="text-[10px] bg-transparent outline-none w-[80px] font-bold text-gray-600" /><div className="w-px h-2.5 bg-gray-300 mx-0.5"></div><select value={item.checkInTime || '15:00'} onChange={(e) => onUpdate(item.id, 'checkInTime', e.target.value)} onClick={(e) => e.stopPropagation()} disabled={!isOwner} className="text-[10px] bg-transparent outline-none text-gray-600 font-bold">{TIME_OPTIONS.map(t => <option key={t} value={t}>{t}</option>)}</select></div>
                                                <div className="flex items-center gap-1 bg-[#E2E2E2] border border-gray-300 px-1.5 py-0.5 rounded-lg"><LogOutIcon size={10} className="text-red-500" /><input type="date" value={item.checkOutDate || ''} onChange={(e) => onUpdate(item.id, 'checkOutDate', e.target.value)} onClick={(e) => e.stopPropagation()} disabled={!isOwner} className="text-[10px] bg-transparent outline-none w-[80px] font-bold text-gray-600" /><div className="w-px h-2.5 bg-gray-300 mx-0.5"></div><select value={item.checkOutTime || '10:00'} onChange={(e) => onUpdate(item.id, 'checkOutTime', e.target.value)} onClick={(e) => e.stopPropagation()} disabled={!isOwner} className="text-[10px] bg-transparent outline-none text-gray-600 font-bold">{TIME_OPTIONS.map(t => <option key={t} value={t}>{t}</option>)}</select></div>
                                            </div>
                                        </div>
                                        <div className="px-1 flex gap-2 items-center">
                                            <div className="flex-[2] min-w-0"><AutoSaveInput type="text" readOnly={!isOwner} detectLinks={true} placeholder="備註..." value={item.note} onSave={(val) => onUpdate(item.id, 'note', val)} className="text-xs text-gray-600 bg-transparent outline-none w-full border-b border-yellow-200 border-dashed" /></div>
                                            <div className="flex gap-1 flex-1 items-center justify-end">
                                                <div className="flex items-center bg-white/60 rounded-lg px-1 border border-yellow-200 w-16 h-6"><span className="text-[10px] text-gray-400 mr-0.5">$</span><AutoSaveInput type="number" readOnly={!isOwner} value={item.cost} onSave={(val) => onUpdate(item.id, 'cost', val)} className="text-[10px] bg-transparent outline-none w-full text-right font-bold" /></div>
                                                <div className="relative w-12 h-6 bg-white/60 rounded-lg border border-yellow-200 flex items-center"><select value={item.currency || 'JPY'} onChange={(e) => onUpdate(item.id, 'currency', e.target.value)} disabled={!isOwner} className="w-full text-[10px] bg-transparent outline-none text-center font-bold">{currencies.map(c => <option key={c.value} value={c.value}>{c.value}</option>)}</select></div>
                                                <div className="relative w-14 h-6 bg-white/60 rounded-lg border border-yellow-200 flex items-center"><select value={item.payer || (members?.[0]?.name) || '我'} onChange={(e) => onUpdate(item.id, 'payer', e.target.value)} disabled={!isOwner} className="w-full text-[10px] bg-transparent outline-none text-center font-bold">{(members || []).map(m => m ? <option key={m.name} value={m.name}>{m.name}</option> : null)}</select></div>
                                            </div>
                                        </div>
                                        <div className="flex flex-col gap-1">
                                            <div className="flex gap-2 items-stretch"><div className="flex items-center gap-1 bg-[#E2E2E2] border border-gray-300 px-2 py-0.5 rounded-lg flex-[3]"><Phone size={10} className="text-green-600" /><AutoSaveInput type="text" readOnly={!isOwner} placeholder="電話" value={item.phone} onSave={(val) => onUpdate(item.id, 'phone', val)} className="text-xs text-gray-600 bg-transparent outline-none w-full" /></div><div className="flex items-center gap-1 bg-[#E2E2E2] border border-gray-300 px-2 py-0.5 rounded-lg flex-[7]"><MapPin size={10} className="text-red-500" /><AutoSaveInput type="text" readOnly={!isOwner} placeholder="地址" value={item.address} onSave={(val) => onUpdate(item.id, 'address', val)} className="text-xs text-gray-600 bg-transparent outline-none w-full" /><button onClick={() => item.address && openGoogleMaps(item.address)} className="text-blue-500 p-1"><Navigation size={10} /></button></div></div>
                                            <div className="flex items-center gap-2 overflow-x-auto pb-1 no-scrollbar mt-0.5">
                                                {item.photoUrls?.map((p, i) => { if (!p) return null; const url = typeof p === 'string' ? p : p.url; const uploader = typeof p === 'string' ? 'unknown' : p.uploader; const canDelete = isOwner || (currentMember && uploader === currentMember.name); return (<div key={i} className="relative flex-shrink-0"> <img src={url} className="w-10 h-10 object-cover rounded-lg border border-yellow-200" onClick={() => onViewImage(url)} /> {canDelete && <button onClick={() => onPhotoDelete(item.id, url, 'accom')} className="absolute -top-1 -right-1 bg-red-500 text-white rounded-full p-0.5"><X size={10} /></button>} </div>); })}
                                                <button onClick={() => { const currentList = Array.isArray(data) ? data : []; const itemData = currentList.find(i => i.id === item.id); onPhotoUpload(item.id, itemData); }} className="w-10 h-10 flex items-center justify-center border-2 border-dashed border-yellow-300 text-yellow-500 rounded-lg bg-yellow-100 flex-shrink-0"><Image size={16} /></button>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        );
                    })}
                    {isOwner && <button onClick={onAdd} className="absolute -bottom-6 right-2 bg-yellow-400 text-white shadow-md rounded-full p-1.5 border-2 border-white"><Plus size={14} /></button>}
                </div>
            );
        };

        const EditTripModal = ({ isOpen, onClose, tripData, onSave }) => {
            const [formData, setFormData] = useState({});
            useEffect(() => { if (isOpen && tripData) setFormData({ destination: tripData.destination, startDate: tripData.startDate, endDate: tripData.endDate, currency: tripData.currency }); }, [isOpen, tripData]);
            if (!isOpen) return null;
            return (
                <div className="fixed inset-0 z-50 flex items-center justify-center px-4">
                    <div className="absolute inset-0 bg-black/20 backdrop-blur-sm" onClick={onClose}></div>
                    <div className="bg-[#F5FDFC] w-full max-w-sm rounded-2xl p-6 border border-[#eeeeee] relative z-10 flex flex-col">
                        <h3 className="text-lg font-bold mb-4">編輯旅程</h3>
                        <div className="space-y-4">
                            <div><label className="text-xs font-bold text-gray-500">目的地</label><input value={formData.destination} onChange={e => setFormData({...formData, destination: e.target.value})} className="w-full p-2 bg-[#E2E2E2] rounded-xl text-sm" /></div>
                            <div className="flex gap-2"><div><label className="text-xs font-bold text-gray-500">開始</label><input type="date" value={formData.startDate} onChange={e => setFormData({...formData, startDate: e.target.value})} className="w-full p-2 bg-[#E2E2E2] rounded-xl text-sm" /></div><div><label className="text-xs font-bold text-gray-500">結束</label><input type="date" value={formData.endDate} onChange={e => setFormData({...formData, endDate: e.target.value})} className="w-full p-2 bg-[#E2E2E2] rounded-xl text-sm" /></div></div>
                            <div><label className="text-xs font-bold text-gray-500">貨幣</label><select value={formData.currency} onChange={e => setFormData({...formData, currency: e.target.value})} className="w-full p-2 bg-[#E2E2E2] rounded-xl text-sm">{currencies.map(c => <option key={c.value} value={c.value}>{c.label}</option>)}</select></div>
                            <button onClick={() => { onSave(formData); onClose(); }} className="w-full py-3 bg-[#0ABAB5] text-white rounded-xl font-bold mt-2">儲存</button>
                        </div>
                    </div>
                </div>
            );
        };

        const ActivityModal = ({ isOpen, onClose, onSave, tripData, defaultValues, currentMember, selectedDate, onUpdateCategories }) => {
            const [formData, setFormData] = useState({ date: selectedDate, time: '09:00', title: '', note: '', transport: 'walk', duration: '60', cost: '', currency: 'JPY', paymentMethod: 'cash', payer: '我', category: '', photoUrls: [] });
            const [isAddingCat, setIsAddingCat] = useState(false); const [newCatName, setNewCatName] = useState(""); const fileRef = useRef(null);

            // [MODIFIED] Removed tripData from dependencies to prevent reset during updates
            useEffect(() => {
                if (isOpen) {
                    if (defaultValues) {
                         setFormData({ ...defaultValues, currency: defaultValues.currency || tripData?.currency || 'JPY', paymentMethod: defaultValues.paymentMethod || 'cash', payer: defaultValues.payer || currentMember?.name || '我', category: defaultValues.category || '', date: defaultValues.date || selectedDate });
                    } else {
                         setFormData({ date: selectedDate, time: '09:00', title: '', note: '', transport: 'walk', duration: '60', bookingCode: '', cost: '', currency: tripData?.currency || 'JPY', paymentMethod: 'cash', payer: currentMember?.name || '我', category: '', photoUrls: [] });
                    }
                    setIsAddingCat(false);
                }
            }, [isOpen]); // Only run when opening

            useEffect(() => {
                if (!formData.category && isOpen && !defaultValues) {
                    if (['train', 'bus', 'taxi', 'car', 'plane'].includes(formData.transport)) setFormData(p => ({ ...p, category: '交通' }));
                    else setFormData(p => ({ ...p, category: '娛樂' }));
                }
            }, [formData.transport, isOpen]);

            if (!isOpen) return null;
            const handleSave = () => { 
                // [MODIFIED] Boundary check for date
                if (formData.date < tripData.startDate || formData.date > tripData.endDate) { alert(`日期必須在旅程範圍內 (${tripData.startDate} ~ ${tripData.endDate})`); return; }
                if(!formData.title.trim()) return alert('請輸入名稱'); 
                onSave({...formData, cost: parseFloat(formData.cost)||0}); onClose(); 
            };
            const handleFile = async (e) => { const url = await processImageUpload(e.target.files[0]); if(url) setFormData(p => ({...p, photoUrls: [...(p.photoUrls||[]), url]})); };

            return (
                <div className="fixed inset-0 z-50 flex items-end sm:items-center justify-center">
                    <div className="absolute inset-0 bg-black/20" onClick={onClose}></div>
                    <div className="bg-[#F5FDFC] w-[85%] sm:max-w-sm rounded-t-3xl sm:rounded-2xl overflow-hidden border border-[#eeeeee] relative z-10 flex flex-col max-h-[90vh]">
                        <div className="bg-[#6A8E83] p-3 text-center text-white font-bold">{defaultValues ? '編輯行程' : '新增行程'}<button onClick={onClose} className="absolute right-3 top-3"><X size={20}/></button></div>
                        <div className="p-4 space-y-4 overflow-y-auto flex-1">
                            <div className="flex gap-2">
                                <div className="flex-1"><label className="text-xs font-bold text-gray-400">日期</label><input type="date" value={formData.date} onChange={e=>setFormData({...formData, date:e.target.value})} className="w-full bg-[#E2E2E2] rounded-xl p-2 text-sm font-bold" /></div>
                                <div className="flex-1"><label className="text-xs font-bold text-gray-400">時間</label><input type="time" value={formData.time} onChange={e=>setFormData({...formData, time:e.target.value})} className="w-full bg-[#E2E2E2] rounded-xl p-2 text-sm font-bold" /></div>
                            </div>
                            <div><label className="text-xs font-bold text-gray-400">名稱</label><input value={formData.title} onChange={e=>setFormData({...formData, title:e.target.value})} className="w-full p-2 bg-[#E2E2E2] rounded-xl text-sm font-bold" autoFocus /></div>
                            <div><label className="text-xs font-bold text-gray-400">備註</label><textarea value={formData.note} onChange={e=>setFormData({...formData, note:e.target.value})} rows={2} className="w-full bg-[#E2E2E2] rounded-xl p-2 text-sm resize-none" /></div>
                            <div className="flex gap-2">
                                <div className="w-1/2"><label className="text-xs font-bold text-gray-400">交通</label><select value={formData.transport} onChange={e=>setFormData({...formData, transport:e.target.value})} className="w-full bg-[#E2E2E2] rounded-xl p-2 text-sm font-bold">{transportOptions.map(t=><option key={t.value} value={t.value}>{t.label}</option>)}</select></div>
                                <div className="w-1/2"><label className="text-xs font-bold text-gray-400">停留</label><select value={formData.duration} onChange={e=>setFormData({...formData, duration:e.target.value})} className="w-full bg-[#E2E2E2] rounded-xl p-2 text-sm font-bold">{durationOptions.map(o=><option key={o.value} value={o.value}>{o.label}</option>)}</select></div>
                            </div>
                            <div className="border-t pt-2">
                                <div className="flex gap-2 mb-2 items-end">
                                    <div className="flex-1"><label className="text-xs font-bold text-gray-400">金額</label><input type="number" value={formData.cost} onChange={e=>setFormData({...formData, cost:e.target.value})} className="w-full bg-[#E2E2E2] rounded-xl p-2 text-sm" /></div>
                                    <div className="w-[35%]"><label className="text-xs font-bold text-gray-400">幣別</label><select value={formData.currency} onChange={e=>setFormData({...formData, currency:e.target.value})} className="w-full bg-[#E2E2E2] rounded-xl p-2 text-sm font-bold">{currencies.map(c=><option key={c.value} value={c.value}>{c.value}</option>)}</select></div>
                                </div>
                                <div className="flex gap-2">
                                    <div className="flex-1"><label className="text-xs font-bold text-gray-400">分類</label>{isAddingCat ? <div className="flex gap-1"><input value={newCatName} onChange={e=>setNewCatName(e.target.value)} className="w-full bg-[#E2E2E2] rounded-xl p-2 text-xs" /><button onClick={()=>{onUpdateCategories([...tripData.expenseCategories, newCatName]); setFormData({...formData, category:newCatName}); setIsAddingCat(false);}} className="bg-[#6A8E83] text-white px-2 rounded"><Check size={14}/></button></div> : <div className="flex gap-1"><select value={formData.category} onChange={e=>setFormData({...formData, category:e.target.value})} className="w-full bg-[#E2E2E2] rounded-xl p-2 text-xs font-bold">{(tripData.expenseCategories||[]).map(c=><option key={c} value={c}>{c}</option>)}</select><button onClick={()=>setIsAddingCat(true)} className="text-[#6A8E83] text-xs font-bold">+新</button></div>}</div>
                                    <div className="flex-1"><label className="text-xs font-bold text-gray-400">付款人</label><select value={formData.payer} onChange={e=>setFormData({...formData, payer:e.target.value})} className="w-full bg-[#E2E2E2] rounded-xl p-2 text-xs font-bold">{tripData.members.map(m => m ? <option key={m.name} value={m.name}>{m.name}</option> : null)}</select></div>
                                </div>
                            </div>
                            <div className="flex gap-2 overflow-x-auto mt-2">{formData.photoUrls?.map((url, i) => <img key={i} src={url} className="w-10 h-10 object-cover rounded" />)}<button onClick={()=>fileRef.current.click()} className="w-10 h-10 border-dashed border-2 rounded flex items-center justify-center"><Camera size={16}/></button><input type="file" ref={fileRef} className="hidden" onChange={handleFile} /></div>
